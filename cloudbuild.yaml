steps:
  - name: 'node'
    entrypoint: 'npm'
    args: ['ci']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/graffiticode/l0001:$COMMIT_SHA', '.']

  - name: gcr.io/cloud-builders/docker
    args: ['push', 'gcr.io/graffiticode/l0001:$COMMIT_SHA']
    id: Push

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - l0001
      - '--platform=managed'
      - '--image=gcr.io/graffiticode/l0001:$COMMIT_SHA'
      - '--labels=commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID'
      - '--region=$_DEPLOY_REGION'
      - '--quiet'
      - '--allow-unauthenticated'
    id: Deploy

images:
  - 'gcr.io/graffiticode/l0001:$COMMIT_SHA'

options:
  substitutionOption: ALLOW_LOOSE

substitutions:
  _DEPLOY_REGION: us-central1

tags:
  - l0001
