steps:
  - name: 'node'
    entrypoint: 'npm'
    args: ['ci']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/l0001-staging:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/l0001-staging:$BRANCH_NAME'
      - '.'

  - name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/l0001-staging']
    id: Push

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - 'l0001-$BRANCH_NAME'
      - '--platform=managed'
      - '--image=gcr.io/$PROJECT_ID/l0001-staging:$COMMIT_SHA'
      - '--labels=commit-sha=$COMMIT_SHA,branch=$BRANCH_NAME'
      - '--region=$_DEPLOY_REGION'
      - '--quiet'
      - '--port=3000'
      - '--set-env-vars=NODE_ENV=staging,BRANCH=$BRANCH_NAME'
      - '--allow-unauthenticated'
      - '--max-instances=10'
      - '--memory=256Mi'
    id: Deploy

images:
  - 'gcr.io/$PROJECT_ID/l0001-staging:$COMMIT_SHA'

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _DEPLOY_REGION: us-central1

tags:
  - l0001
  - staging
