steps:
  - name: 'node'
    entrypoint: 'npm'
    args: ['ci']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/l0001:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/l0001:latest'
      - '.'

  - name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/l0001']
    id: Push

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - l0001
      - '--platform=managed'
      - '--image=gcr.io/$PROJECT_ID/l0001:$COMMIT_SHA'
      - '--labels=commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,branch=$BRANCH_NAME'
      - '--region=$_DEPLOY_REGION'
      - '--quiet'
      - '--port=3000'
      - '--set-env-vars=NODE_ENV=production'
      - '--allow-unauthenticated'
      - '--min-instances=$_MIN_INSTANCES'
      - '--max-instances=$_MAX_INSTANCES'
      - '--memory=$_MEMORY'
    id: Deploy

images:
  - 'gcr.io/$PROJECT_ID/l0001:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/l0001:latest'

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _DEPLOY_REGION: us-central1
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '100'
  _MEMORY: '512Mi'

tags:
  - l0001
  - production
